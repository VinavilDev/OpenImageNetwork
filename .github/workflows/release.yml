name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: oin-node-linux-x64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: oin-node-windows-x64.exe
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: oin-node-macos-arm64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: oin-node-macos-x64
            ext: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build node
        run: cargo build --release --target ${{ matrix.target }} -p oin-node

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/oin-node ${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/oin-node.exe ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum oin-node-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            oin-node-linux-x64
            oin-node-windows-x64.exe
            oin-node-macos-arm64
            oin-node-macos-x64
            SHA256SUMS.txt
